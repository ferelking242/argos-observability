name: Build Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  RUST_TOOLCHAIN: nightly-2026-05-20

jobs:
  # ─── Frontend lint + typecheck ───────────────────────────────────────────────
  frontend:
    name: Frontend — lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: cd web && npm ci --legacy-peer-deps

      - name: Lint
        run: cd web && npm run lint:ci || true

      - name: Typecheck
        run: cd web && npx vue-tsc --noEmit -p tsconfig.app.json || true

  # ─── Rust fmt + clippy + quick build ─────────────────────────────────────────
  backend:
    name: Backend — fmt, clippy, check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          wget -q https://github.com/protocolbuffers/protobuf/releases/download/v21.12/protoc-21.12-linux-x86_64.zip -O protoc.zip
          unzip -q protoc.zip -d protoc
          sudo cp protoc/bin/protoc /usr/local/bin/
          sudo cp -r protoc/include/google /usr/local/include/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt,clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings || true

      - name: Cargo check
        run: cargo check --all-targets
