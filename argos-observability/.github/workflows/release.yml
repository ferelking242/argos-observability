name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  RUST_TOOLCHAIN: nightly-2026-05-20
  BINARY_NAME: argos

jobs:
  # ─── Build frontend once, cache for all platform jobs ───────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          cd web
          npm ci --legacy-peer-deps

      - name: Build
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          cd web
          npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/
          retention-days: 1

  # ─── Build Rust backend for each platform ───────────────────────────────────
  build-backend:
    name: Build — ${{ matrix.label }}
    needs: build-frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            file_name: argos-${{ github.ref_name }}-linux-amd64
            file_ext: .tar.gz
            protoc_url: https://github.com/protocolbuffers/protobuf/releases/download/v21.12/protoc-21.12-linux-x86_64.zip

          - label: Linux x86_64 musl
            os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            file_name: argos-${{ github.ref_name }}-linux-amd64-musl
            file_ext: .tar.gz
            protoc_url: https://github.com/protocolbuffers/protobuf/releases/download/v21.12/protoc-21.12-linux-x86_64.zip

          - label: Linux ARM64
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            file_name: argos-${{ github.ref_name }}-linux-arm64
            file_ext: .tar.gz
            protoc_url: https://github.com/protocolbuffers/protobuf/releases/download/v21.12/protoc-21.12-linux-aarch_64.zip

          - label: macOS x86_64
            os: macos-13
            target: x86_64-apple-darwin
            file_name: argos-${{ github.ref_name }}-darwin-amd64
            file_ext: .tar.gz
            protoc_url: brew

          - label: macOS ARM64 (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            file_name: argos-${{ github.ref_name }}-darwin-arm64
            file_ext: .tar.gz
            protoc_url: brew

          - label: Windows x86_64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            file_name: argos-${{ github.ref_name }}-windows-amd64
            file_ext: .zip
            protoc_url: https://github.com/protocolbuffers/protobuf/releases/download/v21.12/protoc-21.12-win64.zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/

      # ── protoc (Linux) ─────────────────────────────────────────────────────
      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q ${{ matrix.protoc_url }} -O protoc.zip
          unzip -q protoc.zip -d protoc
          sudo cp protoc/bin/protoc /usr/local/bin/
          sudo cp -r protoc/include/google /usr/local/include/

      # ── protoc (macOS) ─────────────────────────────────────────────────────
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf coreutils

      # ── protoc (Windows) ───────────────────────────────────────────────────
      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -L -o protoc.zip ${{ matrix.protoc_url }}
          unzip protoc.zip -d protoc
          cp protoc/bin/protoc.exe C:/windows/system32/protoc.exe
          cp -r protoc/include/google C:/windows/system32/

      # ── musl target ────────────────────────────────────────────────────────
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      # ── Rust toolchain ─────────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}
          components: rustfmt,clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ── Compile ────────────────────────────────────────────────────────────
      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cargo build --release --features mimalloc --target ${{ matrix.target }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package (Linux/macOS) ──────────────────────────────────────────────
      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          BIN=target/${{ matrix.target }}/release/argos
          chmod +x $BIN
          tar -czf ${{ matrix.file_name }}.tar.gz -C target/${{ matrix.target }}/release argos
          sha256sum ${{ matrix.file_name }}.tar.gz > ${{ matrix.file_name }}.tar.gz.sha256

      # ── Package (Windows) ─────────────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/argos.exe .
          7z a ${{ matrix.file_name }}.zip argos.exe
          certutil -hashfile ${{ matrix.file_name }}.zip SHA256 > ${{ matrix.file_name }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.file_name }}
          path: |
            ${{ matrix.file_name }}${{ matrix.file_ext }}
            ${{ matrix.file_name }}${{ matrix.file_ext }}.sha256

  # ─── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build-backend
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: "argos-*"
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Argos Observability ${{ github.ref_name }}"
          body: |
            ## Argos Observability ${{ github.ref_name }}

            Open-source observability platform for logs, traces, metrics and application intelligence.

            ### Download

            | Platform | Binary |
            |---|---|
            | Linux x86_64 | `argos-${{ github.ref_name }}-linux-amd64.tar.gz` |
            | Linux x86_64 (musl) | `argos-${{ github.ref_name }}-linux-amd64-musl.tar.gz` |
            | Linux ARM64 | `argos-${{ github.ref_name }}-linux-arm64.tar.gz` |
            | macOS x86_64 | `argos-${{ github.ref_name }}-darwin-amd64.tar.gz` |
            | macOS ARM64 | `argos-${{ github.ref_name }}-darwin-arm64.tar.gz` |
            | Windows x86_64 | `argos-${{ github.ref_name }}-windows-amd64.zip` |

            ### Quick Start

            ```bash
            tar -xzf argos-${{ github.ref_name }}-linux-amd64.tar.gz
            ZO_ROOT_USER_EMAIL=admin@example.com \
            ZO_ROOT_USER_PASSWORD=Admin#123 \
            ./argos
            # Dashboard → http://localhost:5080/web/
            ```

            ### Verify checksums

            ```bash
            sha256sum -c argos-${{ github.ref_name }}-linux-amd64.tar.gz.sha256
            ```
          files: artifacts/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: false
          token: ${{ secrets.GITHUB_TOKEN }}
